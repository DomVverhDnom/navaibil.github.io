# Статическая сборка фронта на GitHub Pages (бэкенд Node/SQLite на Pages не работает).
#
# Если deploy падает с «Failed to create deployment (404)»:
# Репозиторий → Settings → Pages → в «Build and deployment» для Source выберите
# «GitHub Actions», сохраните, затем Actions → повторите неудачный запуск (Re-run).
# (Сообщение GitHub со ссылкой …/navaibil.github.io/settings/pages часто вводит в заблуждение.)
name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - name: Build
        env:
          # Путь к сайту: https://<user>.github.io/<имя-репозитория>/
          VITE_GH_PAGES_BASE: /${{ github.event.repository.name }}/
          # Опционально: URL вашего API (секрет в Settings → Secrets), иначе запросы идут на github.io
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      # Снижает предупреждение о Node 20 в deploy-pages до перехода GitHub на Node 24 по умолчанию
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4.0.5
