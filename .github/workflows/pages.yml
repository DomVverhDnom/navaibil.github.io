# Статическая сборка фронта на GitHub Pages (бэкенд Node/SQLite на Pages не работает).
#
# Сайт в корне https://<user>.github.io/ — репозиторий должен называться <user>.github.io
# (у вас: DomVverhDnom.github.io). В Custom domain нельзя вписывать *.github.io — только свой домен или пусто.
#
# Если deploy падает с «Failed to create deployment (404)»: Settings → Pages → Source: GitHub Actions → Re-run workflow.
# Белый экран при живом index.html: чаще всего Source = «Deploy from branch» — отдаётся корень репо с /src/main.js, нужен только GitHub Actions + артефакт dist.
name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - name: Build
        env:
          # User/org site: репо <owner>.github.io → base /. Иначе project site → /<repo>/
          VITE_GH_PAGES_BASE: ${{ github.event.repository.name == format('{0}.github.io', github.repository_owner) && '/' || format('/{0}/', github.event.repository.name) }}
          # Опционально: URL вашего API (секрет в Settings → Secrets), иначе запросы идут на origin Pages
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: npm run build
      - name: Проверка: в dist должен быть production-бандл, не /src/main.js
        run: |
          set -e
          if grep -qE '"/src/|/src/main\.js' dist/index.html; then
            echo 'Ошибка: dist/index.html похож на dev-шаблон (есть /src/).'
            cat dist/index.html
            exit 1
          fi
          if ! grep -qE 'assets/[^"]+\.js' dist/index.html; then
            echo 'Ошибка: в dist/index.html нет ссылки на assets/*.js'
            cat dist/index.html
            exit 1
          fi
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      # Снижает предупреждение о Node 20 в deploy-pages до перехода GitHub на Node 24 по умолчанию
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4.0.5
